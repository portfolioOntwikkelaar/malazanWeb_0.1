        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;

              var filter = {

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                 nodes = new vis.DataSet([

  // =========================
  // MALAZAN EMPIRE
  // =========================
  {"id":"Kellanved","label":"Kellanved","group":"Ascendant","shape":"dot","size":30,"font":{"color":"white"},"title":"Emperor Kellanved"},
  {"id":"Dancer","label":"Dancer","group":"Ascendant","shape":"dot","size":28,"font":{"color":"white"},"title":"Dancer"},
  {"id":"Surly","label":"Surly","group":"Malazan","shape":"dot","size":26,"font":{"color":"white"},"title":"Surly / Laseen"},
  {"id":"Tayschrenn","label":"Tayschrenn","group":"Malazan","shape":"dot","size":24,"font":{"color":"white"},"title":"High Mage"},
  {"id":"Dassem Ultor","label":"Dassem Ultor","group":"Malazan","shape":"dot","size":28,"font":{"color":"white"},"title":"First Sword"},
  
  // =========================
  // GUARD / SOLDIERS
  // =========================

  {"id":"Ferrule","label":"Ferrule","group":"Guard","shape":"dot","size":18,"font":{"color":"white"},"title":"Guard commander"},

  {"id":"Artan","label":"Artan","group":"Civilian","shape":"dot","size":18,"font":{"color":"white"},"title":"Dock worker"},

  // =========================
  // ASCENDANTS / SHADOW
  // =========================
  {"id":"Shadowthrone","label":"Shadowthrone","group":"Ascendant","shape":"dot","size":36,"font":{"color":"white"},"title":"Ascendant"},
  {"id":"Cotillion","label":"Cotillion","group":"Ascendant","shape":"dot","size":34,"font":{"color":"white"},"title":"Ascendant"}

]);


edges = new vis.DataSet([

  // Emperor circle

  {"from":"Shadowthrone","to":"Cotillion","color":"green","title":"bondgenoten"},

  // Malazan command
  {"from":"Dassem Ultor","to":"Kellanved","color":"green","title":"First Sword"},
  {"from":"Tayschrenn","to":"Surly","color":"green","title":"loyaliteit"},
  {"from":"Tayschrenn","to":"Kellanved","color":"gray","title":"twijfel"},

  // Guard storyline
  {"from":"Temper","to":"Dassem Ultor","color":"green","title":"loyaliteit"},
  {"from":"Temper","to":"Ferrule","color":"green","title":"guard"},

  // Claw

  {"from":"Hattar","to":"Kellanved","color":"red","title":"assassination plot"},

  {"from":"Surly","to":"Dassem Ultor","color":"red","title":"politieke spanning"},
  {"from":"Tayschrenn","to":"Dassem Ultor","color":"gray","title":"wantrouwen"},

  // Shadow influence
  {"from":"Shadowthrone","to":"Surly","color":"gray","title":"lange termijn conflict"},
  {"from":"Cotillion","to":"Kiska","color":"gray","title":"interesse"}

]);


                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"physics": {"enabled": true, "barnesHut": {"gravitationalConstant": -6000, "centralGravity": 0.15, "springLength": 160, "springConstant": 0.04, "damping": 0.12}}, "nodes": {"borderWidth": 1, "shadow": true, "font": {"size": 14}}, "edges": {"smooth": false, "shadow": false}, "interaction": {"hover": true, "tooltipDelay": 100}};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
